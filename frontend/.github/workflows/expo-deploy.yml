name: Expo Build & Update

on:
  push:
    branches:
      - production

jobs:
  check-changes:
    name: Check what changed
    runs-on: ubuntu-latest
    outputs:
      native_changed: ${{ steps.set-output.outputs.native_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files (native folders)
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'ios/**'
              - 'android/**'
              - 'app.json'
              - 'app.config.js'
              - 'app.config.ts'

      - name: Check if dependencies changed in package.json
        id: pkg-check
        run: |
          PKG_CHANGED=false
          if git diff HEAD~1 HEAD -- package.json | grep -qE '^\+.*"(dependencies|devDependencies)"'; then
            PKG_CHANGED=true
          fi
          echo "pkg_changed=$PKG_CHANGED" >> $GITHUB_OUTPUT

      - name: Set final output
        id: set-output
        run: |
          if [ "${{ steps.filter.outputs.native }}" == "true" ] || [ "${{ steps.pkg-check.outputs.pkg_changed }}" == "true" ]; then
            echo "native_changed=true" >> $GITHUB_OUTPUT
          else
            echo "native_changed=false" >> $GITHUB_OUTPUT
          fi
        
      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # ─── Анализ package.json через Python ────────────────────────
          PACKAGE_IS_NATIVE=false

          if echo "$CHANGED" | grep -q "^package\.json$"; then
            echo "📦 package.json изменился, анализ..."

            PACKAGE_IS_NATIVE=$(python3 << 'EOF'
          import json, subprocess, sys

          def get_pkg(ref):
              result = subprocess.run(
                  ["git", "show", f"{ref}:package.json"],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  return {}
              return json.loads(result.stdout)

          old = get_pkg("HEAD~1")
          new = get_pkg("HEAD")

          # Ключи, изменение которых требует пересборки
          NATIVE_KEYS = ["dependencies", "devDependencies", "peerDependencies"]

          for key in NATIVE_KEYS:
              if old.get(key) != new.get(key):
                  print("true")   # нативное изменение
                  sys.exit(0)

          print("false")  # только версия или другие поля — не нативное
          EOF
            )

            if [ "$PACKAGE_IS_NATIVE" = "true" ]; then
              echo "🔴 Изменились зависимости в package.json"
            else
              echo "🟢 В package.json изменилась только версия (или scripts/другое)"
            fi
          fi

          # ─── Остальные нативные файлы (package.json исключен) ─────────
          NATIVE_PATTERN="^(android/|ios/|package-lock\.json|yarn\.lock|app\.json|app\.config\.(js|ts)|eas\.json|Gemfile)"
          
          if echo "$CHANGED" | grep -qE "$NATIVE_PATTERN" || [ "$PACKAGE_IS_NATIVE" = "true" ]; then
            echo "type=native" >> $GITHUB_OUTPUT
          else
            echo "type=js" >> $GITHUB_OUTPUT
          fi


  ota-update:
    name: OTA Update (JS only)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.native_changed == 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --branch production --message "OTA: ${{ github.event.head_commit.message }}"

  native-build:
    name: Native Build (Android)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.native_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: eas build --platform android --profile production --non-interactive
