name: Expo Build & Update

on:
  push:
    branches:
      - production
    paths:
      - 'frontend/**'

jobs:
  check-changes:
    name: Check what changed
    runs-on: ubuntu-latest
    outputs:
      native_changed: ${{ steps.set-output.outputs.native_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed native files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'frontend/ios/**'
              - 'frontend/android/**'
              - 'frontend/app.json'
              - 'frontend/app.config.js'
              - 'frontend/app.config.ts'
              - 'frontend/eas.json'
              - 'frontend/package-lock.json'
              - 'frontend/yarn.lock'

      - name: Check if dependencies changed
        id: pkg-check
        run: |
          PKG_CHANGED=false
          if git diff HEAD~1 HEAD -- frontend/package.json \
            | grep -qE '^\+.*"(dependencies|devDependencies|peerDependencies)"'; then
            PKG_CHANGED=true
          fi
          echo "pkg_changed=$PKG_CHANGED" >> $GITHUB_OUTPUT

      - name: Set final output
        id: set-output
        run: |
          if [ "${{ steps.filter.outputs.native }}" == "true" ] \
          || [ "${{ steps.pkg-check.outputs.pkg_changed }}" == "true" ]; then
            echo "native_changed=true" >> $GITHUB_OUTPUT
          else
            echo "native_changed=false" >> $GITHUB_OUTPUT
          fi

  ota-update:
    name: OTA Update (JS only)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.native_changed == 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        working-directory: ./frontend
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: eas update --branch production --message "OTA: $COMMIT_MSG"


  native-build:
    name: Native Build (Android)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.native_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        working-directory: ./frontend
        run: eas build --platform android --profile production --non-interactive
